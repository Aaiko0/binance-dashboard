<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>净值走势</title>
    <link rel="stylesheet" href="./equity-history.css" />
  </head>
  <body>
    <div class="window-shell">
      <header class="window-header">
        <div class="window-copy">
          <span class="eyebrow">ACCOUNT EQUITY</span>
          <div class="title-row">
            <h1>净值走势</h1>
            <span class="title-badge">固定 5 分钟采样</span>
          </div>
        </div>

        <div class="window-actions">
          <button id="refreshButton" class="header-button" type="button">刷新</button>
          <button id="openFolderButton" class="header-button" type="button">目录</button>
          <button id="minimizeButton" class="header-button small" type="button">_</button>
          <button id="closeButton" class="header-button small danger" type="button">×</button>
        </div>
      </header>

      <main class="window-content">
        <section id="metricGroup" class="metric-group" aria-label="图表指标">
          <button class="metric-button active" data-metric="totalReturn" type="button">总收益率</button>
          <button class="metric-button" data-metric="accountAsset" type="button">账户资产</button>
          <button class="metric-button" data-metric="cumulativeProfit" type="button">累计收益</button>
          <button class="metric-button" data-metric="monthlyReturn" type="button">月收益率</button>
        </section>

        <section class="summary-grid">
          <article class="summary-card">
            <span id="summaryLabel" class="summary-label">当前资产</span>
            <strong id="summaryValue">--</strong>
            <span id="summaryDetail" class="summary-detail">按 5 分钟净值历史和当前快照计算。</span>
          </article>
        </section>

        <section class="toolbar">
          <div class="range-group" id="rangeGroup">
            <button class="range-button" data-range="24h" type="button">24H</button>
            <button class="range-button" data-range="7d" type="button">7D</button>
            <button class="range-button active" data-range="30d" type="button">30D</button>
            <button class="range-button" data-range="90d" type="button">90D</button>
            <button class="range-button" data-range="180d" type="button">180D</button>
            <button class="range-button" data-range="1y" type="button">1Y</button>
            <button class="range-button" data-range="all" type="button">全部</button>
          </div>

          <div class="export-group">
            <label class="export-label" for="exportIntervalInput">导出间隔</label>
            <input id="exportIntervalInput" type="number" min="5" step="5" list="exportIntervalOptions" value="15" />
            <datalist id="exportIntervalOptions">
              <option value="5"></option>
              <option value="10"></option>
              <option value="15"></option>
              <option value="20"></option>
              <option value="30"></option>
              <option value="60"></option>
              <option value="120"></option>
            </datalist>
            <button id="exportButton" class="primary-button" type="button">导出 CSV</button>
          </div>
        </section>

        <section class="chart-panel">
          <div class="chart-meta">
            <div>
              <span class="meta-label">区间变化</span>
              <strong id="rangeDelta">--</strong>
            </div>
            <div class="meta-right">
              <span class="meta-label">存储位置</span>
              <strong id="storagePath">--</strong>
            </div>
          </div>

          <div id="chartEmpty" class="chart-empty" hidden>
            <strong>还没有净值历史点</strong>
            <p id="chartEmptyHint">应用会在下一个 5 分钟节点自动写入净值。</p>
          </div>

          <div id="chartCanvasWrap" class="chart-canvas-wrap" hidden>
            <div class="chart-body">
              <div class="y-axis">
                <span id="axisYTitle" class="axis-title vertical">资产 USDT</span>
                <span id="axisYTop" class="axis-tick">--</span>
                <span id="axisYMid" class="axis-tick">--</span>
                <span id="axisYBottom" class="axis-tick">--</span>
              </div>

              <div class="chart-main">
                <div class="chart-stage">
                  <div id="chartTooltip" class="chart-tooltip" hidden>
                    <strong id="selectedPointTime">--</strong>
                    <span id="selectedPointDetail">点击曲线查看详情</span>
                  </div>
                  <svg id="chartSvg" viewBox="0 0 680 260" preserveAspectRatio="none"></svg>
                </div>

                <div class="x-axis">
                  <span class="axis-title">时间</span>
                  <div id="axisXTicks" class="x-axis-ticks"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="records-panel">
          <div class="records-head">
            <span>最近采样</span>
            <span id="recordCountHint">0 条</span>
          </div>
          <div id="recordsList" class="records-list"></div>
        </section>

        <div id="statusMessage" class="status-message">准备就绪</div>
      </main>
    </div>

    <script src="./web-bridge.js"></script>
    <script src="./equity-history.js"></script>
  </body>
</html>
